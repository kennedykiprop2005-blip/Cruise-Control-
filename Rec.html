<html>
<head>

<body>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>

    </body>
</html>

    <header style="text-align: center; padding: 20px; background: #ffffff; border-bottom: 3px solid #0056b3; margin-bottom: 20px;">
        <h1 style="color: #0056b3;">CRUISE CONTROL</h1>
        <p style="color: #d32f2f; font-weight: bold;">System Audit Trail</p>
    </header>

    <div class="nav">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

    <div id="allRecordsList">Loading all archives...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBTYM84E6TSy0Q2QUZSt9MCYn6uAiZ6HpI",
          authDomain: "site-bcb4b.firebaseapp.com",
          projectId: "site-bcb4b",
          storageBucket: "site-bcb4b.firebasestorage.app",
          messagingSenderId: "586333698174",
          appId: "1:586333698174:web:cae8db0888c460047d802f",
          measurementId: "G-2RFQQQ2EPP"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadAllRecords() {
            const querySnapshot = await getDocs(collection(db, "rentals"));
            const list = document.getElementById('allRecordsList');
            list.innerHTML = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'record-card';
                div.innerHTML = `
                    <strong>Client: ${data.clientName}</strong> | Status: ${data.status}<br>
                    Car: ${data.carModel} (${data.numberPlate})<br>
                    Started: ${data.dateTaken} | Due: ${data.expectedReturnDate}<br>
                    Total Days: ${data.daysTaken} | Rate: KES ${data.ratePerDay}<br>
                    <strong>Paid: KES ${data.amountPaid} | Balance: KES ${data.arrearsRemaining}</strong>
                `;
                list.appendChild(div);
            });
        }
        loadAllRecords();
    </script>
</body>
</html>
