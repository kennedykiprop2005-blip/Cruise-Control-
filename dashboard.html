    <h2>Active Rentals</h2>
    <div id="rentalList">Loading records...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBTYM84E6TSy0Q2QUZSt9MCYn6uAiZ6HpI",
          authDomain: "site-bcb4b.firebaseapp.com",
          projectId: "site-bcb4b",
          storageBucket: "site-bcb4b.firebasestorage.app",
          messagingSenderId: "586333698174",
          appId: "1:586333698174:web:cae8db0888c460047d802f",
          measurementId: "G-2RFQQQ2EPP"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadRentals() {
            const querySnapshot = await getDocs(collection(db, "rentals"));
            const list = document.getElementById('rentalList');
            list.innerHTML = '';
            
            const today = new Date();
            today.setHours(0,0,0,0);

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Only show if status is not 'Completed'
                if (data.status === 'Completed') return;

                const returnDate = new Date(data.expectedReturnDate);
                const timeDiff = returnDate - today;
                const daysUntilReturn = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
                const isUrgent = daysUntilReturn <= 1;

                const div = document.createElement('div');
                div.className = isUrgent ? 'card urgent' : 'card';
                div.innerHTML = `
                    <strong>${data.clientName}</strong><br>
                    Car: ${data.carModel} | Plate: ${data.numberPlate}<br>
                    <strong>Arrears: KES ${data.arrearsRemaining}</strong><br>
                    ${isUrgent ? `<div style="color: red; font-weight: bold;">⚠️ Due in ${daysUntilReturn <= 0 ? '0' : '1'} day(s)</div>` : ''}
                    <button onclick="addPayment('${doc.id}', ${data.arrearsRemaining}, ${data.amountPaid})">Record Payment</button>
                    <button class="extend-btn" onclick="extendRental('${doc.id}', ${data.daysTaken}, ${data.ratePerDay}, ${data.arrearsRemaining}, '${data.dateTaken}')">Extend Rental</button>
                    <button class="complete-btn" onclick="closeRental('${doc.id}', ${data.arrearsRemaining})">Mark Completed</button>
                `;
                list.appendChild(div);
            });
        }

        window.addPayment = async (id, currentArrears, currentPaid) => {
            const paid = prompt("Enter amount paid today:");
            if (paid && !isNaN(paid)) {
                const amount = parseFloat(paid);
                await updateDoc(doc(db, "rentals", id), { 
                    arrearsRemaining: currentArrears - amount,
                    amountPaid: currentPaid + amount
                });
                alert("Payment updated!");
                loadRentals();
            }
        };

        window.extendRental = async (id, oldDays, rate, currentArrears, startDate) => {
            const extraDays = prompt("How many additional days?");
            if (extraDays && !isNaN(extraDays)) {
                const addedDays = parseInt(extraDays);
                const newTotalDays = oldDays + addedDays;
                
                const newReturnDate = new Date(startDate);
                newReturnDate.setDate(newReturnDate.getDate() + newTotalDays);
                const returnDateString = newReturnDate.toISOString().split('T')[0];

                await updateDoc(doc(db, "rentals", id), { 
                    daysTaken: newTotalDays,
                    expectedReturnDate: returnDateString,
                    arrearsRemaining: currentArrears + (addedDays * rate)
                });
                alert("Rental extended!");
                loadRentals();
            }
        };

        window.closeRental = async (id, arrears) => {
            if (arrears > 0) {
                alert("Cannot complete: Client still has KES " + arrears + " in arrears.");
                return;
            }
            if (confirm("Close this rental record?")) {
                await updateDoc(doc(db, "rentals", id), { status: "Completed" });
                alert("Rental archived.");
                loadRentals();
            }
        };

        loadRentals();
    </script>
</body>
