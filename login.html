<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise Control | Login</title>
    <style>
        :root { --primary-color: #0056b3; --background-color: #f4f7f6; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--background-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* --- Loader Screen Layout --- */
        #authLoader {
            text-align: center;
            font-weight: 600;
            color: var(--primary-color);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 86, 179, 0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Main Login Box (Hidden initially) --- */
        .login-box { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            display: none; 
        }
        h2 { text-align: center; color: var(--primary-color); margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-btn { 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }
        .error-msg { color: #d32f2f; text-align: center; font-size: 0.85rem; margin-top: 10px; min-height: 20px;}
    </style>
</head>
<body>

    <div id="authLoader">
        <div class="spinner"></div>
        <div>Checking session authorization...</div>
    </div>

    <div class="login-box" id="loginBox">
        <h2>CRUISE CONTROL</h2>
        <p style="text-align: center; margin-top: -15px; margin-bottom: 25px; font-size: 14px; color: #666;">Authorized Personnel Only</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Log In</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
    </div>

    <script type="module">
        // 1. Import Firebase Authentication tools
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        // Added 'onAuthStateChanged' to manage pre-render validation gate
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // 2. Your Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyBTYM84E6TSy0Q2QUZSt9MCYn6uAiZ6HpI",
          authDomain: "site-bcb4b.firebaseapp.com",
          projectId: "site-bcb4b",
          storageBucket: "site-bcb4b.firebasestorage.app",
          messagingSenderId: "586333698174",
          appId: "1:586333698174:web:cae8db0888c460047d802f",
          measurementId: "G-2RFQQQ2EPP"
        };

        // 3. Initialize App and Auth
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authLoader = document.getElementById('authLoader');
        const loginBox = document.getElementById('loginBox');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        // 4. Background Auth State Check (Fixes the 2-second visual delay)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Active authentication token detected. Pass straight through to index.
                window.location.href = "index.html";
            } else {
                // No current token. Drop loader screen and cleanly map the inputs into layout view.
                authLoader.style.display = 'none';
                loginBox.style.display = 'block';
            }
        });

        // 5. Handle the Login Form Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            loginBtn.textContent = "Verifying...";
            loginBtn.disabled = true;
            errorMsg.textContent = "";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html";
                
            } catch (error) {
                console.error("Login Failed:", error.message);
                errorMsg.textContent = "Invalid email or password.";
                
                loginBtn.textContent = "Log In";
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
