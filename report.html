    <div class="card">
        <h1>Monthly Revenue</h1>
        <h2 id="revenueDisplay">Calculating...</h2>
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBTYM84E6TSy0Q2QUZSt9MCYn6uAiZ6HpI",
          authDomain: "site-bcb4b.firebaseapp.com",
          projectId: "site-bcb4b",
          storageBucket: "site-bcb4b.firebasestorage.app",
          messagingSenderId: "586333698174",
          appId: "1:586333698174:web:cae8db0888c460047d802f",
          measurementId: "G-2RFQQQ2EPP"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadRevenue() {
            const querySnapshot = await getDocs(collection(db, "rentals"));
            let totalRevenue = 0;
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // Only sum up payments for completed rentals
                if (data.status === 'Completed') {
                    totalRevenue += (data.amountPaid || 0);
                }
            });
            
            document.getElementById('revenueDisplay').innerText = "KES " + totalRevenue.toLocaleString();
        }

        loadRevenue();
    </script>
